name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  actions: read
  contents: read
  packages: write

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ─── Install, Lint, Test, Build ─────────────────────────────────────────────
  ci:
    name: Lint / Test / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint all projects
        run: pnpm exec nx run-many -t lint

      - name: Test all projects
        run: pnpm exec nx run-many -t test

      - name: Build all projects
        run: pnpm exec nx run-many -t build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ─── Docker Build & Push (main branch only) ─────────────────────────────────
  docker:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api-gateway/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push auth-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/auth-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/auth-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - run: npx nx fix-ci
        if: always()
