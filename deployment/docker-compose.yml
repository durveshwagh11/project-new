version: '3.9'

services:
  # --- Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network
    restart: unless-stopped

  # --- Angular Frontend ---
  frontend:
    build:
      context: ..
      dockerfile: apps/frontend/Dockerfile
    container_name: frontend
    expose:
      - '80'
    networks:
      - app-network
    restart: unless-stopped

  # --- NestJS Backend (port 3000) ---
  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    container_name: backend
    expose:
      - '3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      FRONTEND_URL: http://localhost
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/durvesh_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    networks:
      - app-network
    depends_on:
      - postgres
    restart: unless-stopped

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: durvesh_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
